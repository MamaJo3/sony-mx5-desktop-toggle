name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ('${{ github.ref_type }}' -eq 'tag') { '${{ github.ref_name }}' } else { '${{ github.event.inputs.version }}' }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build self-contained release bundle
        shell: pwsh
        run: ./publish-release.ps1 -Version "${{ steps.ver.outputs.version }}"

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XM5Ambient-${{ steps.ver.outputs.version }}
          path: release/*.zip
